<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PHENIX: NULL EDEN — A cyber-survival roguelite</title>
  <!-- Preload menu theme so it's cached before the first click (no autoplay) -->
  <link rel="preload" as="audio" href="assets/audio/music/menu_theme.mp3?v=10" type="audio/mpeg">
  <link rel="preload" as="audio" href="assets/audio/music/gameplay_theme.mp3?v=2" type="audio/mpeg">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      height: 100%;
      overscroll-behavior: none;   /* prevent pull-to-refresh / elastic overscroll */
    }
    body {
      background: #05080f;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100vh;               /* fallback for older browsers */
      height: 100dvh;              /* dynamic viewport: excludes mobile address bar */
      overflow: hidden;
      overscroll-behavior: none;
      font-family: Consolas, monospace;
    }
    canvas {
      display: block;
      cursor: crosshair;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #click-to-start {
      position: absolute;
      bottom: 16px;
      color: #78919f;
      font-size: 14px;
      font-family: Consolas, monospace;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game" width="1280" height="720"></canvas>
  <!-- deploy fix v4 — retrigger pages build (642624f deploy failed upstream) -->
  <div id="click-to-start">Click or press any key to enable music &nbsp;|&nbsp; M = mute &nbsp;|&nbsp; ESC = pause</div>
  <!-- Import map: single source of truth for constants.js cache-busting. constants.js is imported
       by ~16 modules WITHOUT a ?v, so the browser used to serve a stale copy after every deploy
       (WORLD size / VIEW_SCALE changes needed a hard refresh). This remaps every resolved
       ".../js/constants.js" import to a versioned URL. To bust constants.js in future, bump the
       ONE ?v below — every module then re-fetches fresh constants automatically, no hard refresh. -->
  <script type="importmap">
  {
    "imports": {
      "./js/constants.js": "./js/constants.js?v=20260709630000"
    }
  }
  </script>
  <script type="module" src="js/main.js?v=20260711950000"></script>
</body>
</html>
