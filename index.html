<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0a1020">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PHENIX: NULL EDEN — A cyber-survival roguelite</title>
  <!-- Music preloads REMOVED (2026-07-17): they warned in console (unsupported `as` value)
       and were dead weight — they fetched ?v=10 / ?v=2 while AudioManager actually plays
       ?v=20260615210000, a different cache key, so megabytes downloaded at boot were never
       reused. Music now loads once, on the first user gesture, as AudioManager always did. -->
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html {
      height: 100%;
      overscroll-behavior: none;   /* prevent pull-to-refresh / elastic overscroll */
    }
    body {
      background: #05080f;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100vh;               /* fallback for older browsers */
      height: 100dvh;              /* dynamic viewport: excludes mobile address bar */
      overflow: hidden;
      overscroll-behavior: none;
      font-family: Consolas, monospace;
    }
    canvas {
      display: block;
      cursor: crosshair;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    #click-to-start {
      position: absolute;
      bottom: 16px;
      color: #78919f;
      font-size: 14px;
      font-family: Consolas, monospace;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="game" width="1280" height="720"></canvas>
  <!-- In-app browser guard: Messenger/Viber/Instagram etc. render the game in a slow WebView
       that lags/crashes. Detect those (NOT normal Chrome, NOT our future TWA) and prompt the
       user to open in Chrome. Purely additive; on real Chrome nothing shows and boot is unchanged. -->
  <script>
  (function(){
    try{
      var ua = navigator.userAgent || '';
      var known = /FBAN|FBAV|FB_IAB|FBIOS|Messenger|Orca-Android|Instagram|Line\/|Viber|WhatsApp|MicroMessenger|Snapchat|TikTok|Twitter|Pinterest|GSA/i.test(ua);
      // Generic Android in-app WebView signal ("; wv" or "Version/x.x ... Chrome" — real Chrome
      // mobile has neither). Exclude our own TWA (launched from the installed app → referrer android-app://).
      var isWebView = /;\s?wv\)/i.test(ua) || /\bVersion\/\d+\.\d+\b.*\bChrome\//i.test(ua);
      var isTWA = (document.referrer || '').indexOf('android-app://') === 0;
      var inApp = known || (isWebView && !isTWA);
      if(!inApp) return;
      var isAndroid = /Android/i.test(ua);
      var full = location.href;
      var host = full.replace(/^https?:\/\//,'');
      var chromeIntent = 'intent://'+host+'#Intent;scheme=https;package=com.android.chrome;end';
      var ov = document.createElement('div');
      ov.setAttribute('style','position:fixed;inset:0;z-index:99999;background:linear-gradient(160deg,#05080f,#0a1424);color:#dff2ff;font-family:Consolas,monospace;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:28px;');
      ov.innerHTML =
        '<div style="font-size:22px;font-weight:bold;letter-spacing:1px;color:#2ee6f6;text-shadow:0 0 12px rgba(46,230,246,.6);margin-bottom:14px;">PHENIX: NULL EDEN</div>'+
        '<div style="font-size:15px;line-height:1.6;max-width:420px;margin-bottom:22px;color:#bfe0f2;">Άνοιξε το παιχνίδι στον <b>Google Chrome</b> για ομαλό παιχνίδι.<br>Ο browser της εφαρμογής (Messenger/Viber/Instagram) κολλάει.</div>'+
        (isAndroid
          ? '<a id="ib-chrome" href="'+chromeIntent.replace(/"/g,'&quot;')+'" style="display:block;padding:16px 30px;border-radius:12px;background:linear-gradient(180deg,#0f2a44,#04101e);border:1.5px solid rgba(46,230,246,.7);color:#cfefff;font-size:17px;font-weight:bold;text-decoration:none;box-shadow:0 0 16px rgba(46,230,246,.4);text-shadow:0 0 6px rgba(46,230,246,.8);margin-bottom:16px;">▶ Άνοιγμα σε Chrome</a>'
          : '<div style="font-size:14px;line-height:1.6;max-width:400px;margin-bottom:16px;color:#9fc7dd;">Πάτησε το μενού (⋯ ή το βελάκι πάνω δεξιά) και διάλεξε <b>«Άνοιγμα σε Safari / Chrome»</b>.</div>')+
        '<button id="ib-copy" style="padding:13px 26px;border-radius:10px;background:rgba(10,26,44,.9);border:1.5px solid rgba(120,180,220,.5);color:#bfe0f2;font-size:14px;font-family:Consolas,monospace;">📋 Αντιγραφή link</button>'+
        '<div id="ib-copied" style="font-size:12px;color:#7fd6a0;margin-top:10px;height:16px;"></div>';
      document.body.appendChild(ov);
      var copyBtn = ov.querySelector('#ib-copy'), copied = ov.querySelector('#ib-copied');
      copyBtn.addEventListener('click', function(){
        var done = function(){ copied.textContent = 'Αντιγράφηκε! Επικόλλησε το στον Chrome.'; };
        if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(full).then(done, done); }
        else { try{ var t=document.createElement('textarea'); t.value=full; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); done(); }catch(e){ copied.textContent = full; } }
      });
    }catch(e){}
  })();
  </script>
  <!-- deploy fix v4 — retrigger pages build (642624f deploy failed upstream) -->
  <div id="click-to-start">Click or press any key to enable music &nbsp;|&nbsp; M = mute &nbsp;|&nbsp; ESC = pause</div>
  <!-- Import map: single source of truth for constants.js cache-busting. constants.js is imported
       by ~16 modules WITHOUT a ?v, so the browser used to serve a stale copy after every deploy
       (WORLD size / VIEW_SCALE changes needed a hard refresh). This remaps every resolved
       ".../js/constants.js" import to a versioned URL. To bust constants.js in future, bump the
       ONE ?v below — every module then re-fetches fresh constants automatically, no hard refresh. -->
  <script type="importmap">
  {
    "imports": {
      "./js/constants.js": "./js/constants.js?v=20260724000000"
    }
  }
  </script>
  <!-- Service Worker. LOCAL QA SAFETY (Maria 2026-07-19): on localhost/127.0.0.1 the SW is
       NOT registered and any existing registration + cache is torn down. During QA the local
       server drops out, the SW then served yesterday's cached main.js while newer modules came
       from disk, and the result was a half-old/half-new build — that is where the "old GRID
       LIMIT" and the dead menu came from, and it silently invalidated test runs. Production
       (github.io) keeps the SW exactly as before; only the local origin opts out. -->
  <script>(function(){
    var _local = location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.hostname === "";
    if(!("serviceWorker" in navigator)) return;
    if(_local){
      navigator.serviceWorker.getRegistrations().then(function(rs){ rs.forEach(function(r){ r.unregister(); }); }).catch(function(){});
      if(window.caches) caches.keys().then(function(ks){ ks.forEach(function(k){ caches.delete(k); }); }).catch(function(){});
      console.log("[SW] localhost — service worker disabled and caches cleared (QA always sees the real build)");
      return;
    }
    var _hadSW=!!navigator.serviceWorker.controller;
    addEventListener("load",function(){navigator.serviceWorker.register("sw.js",{updateViaCache:"none"}).then(function(r){r.update();setInterval(function(){r.update();},60000);}).catch(function(){});});
    var _swReloaded=false;
    navigator.serviceWorker.addEventListener("controllerchange",function(){if(!_hadSW||_swReloaded)return;_swReloaded=true;location.reload();});
  })();</script>
  <script type="module" src="js/main.js?v=20260728000000"></script>
</body>
</html>
